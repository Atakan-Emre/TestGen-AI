<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="120">
  <defs>
    <!-- Metin ve İkon için Gradient Tanımları -->
    <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="gradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Logo İkonu (Hegzagon + Onay ve AI Noktaları) -->
  <g transform="translate(20, 15)">
    <!-- Arka plan hegzagonu -->
    <path d="M45,5 L80,25 L80,65 L45,85 L10,65 L10,25 Z" fill="url(#gradIcon)" opacity="0.9" filter="url(#glow)"/>
    <!-- İç parıltı hegzagonu -->
    <path d="M45,18 L67,30 L67,60 L45,72 L23,60 L23,30 Z" fill="#ffffff" opacity="0.15"/>
    
    <!-- Test/AI Onay İşareti ve Düğümler -->
    <path d="M30,45 L42,55 L60,30" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="60" cy="30" r="4.5" fill="#ffffff" />
    <circle cx="42" cy="55" r="4.5" fill="#ffffff" />
    <circle cx="30" cy="45" r="4.5" fill="#ffffff" />
  </g>

  <!-- Metin: TestGen AI -->
  <text x="125" y="72" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="800" fill="url(#gradText)" letter-spacing="-1">TestGen</text>
  <text x="315" y="72" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="900" fill="#8B5CF6">AI</text>
  
  <!-- Alt Vurgu Çizgisi -->
  <rect x="130" y="88" width="235" height="4" rx="2" fill="url(#gradText)" opacity="0.7"/>
</svg>

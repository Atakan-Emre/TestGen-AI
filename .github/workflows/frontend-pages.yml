name: Frontend Pages Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
      VITE_API_URL: ${{ vars.VITE_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --include=optional

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build:pages

      - name: Configure Pages and enable site
        if: ${{ secrets.PAGES_ADMIN_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_ADMIN_TOKEN }}
          enablement: true

      - name: Configure Pages
        if: ${{ secrets.PAGES_ADMIN_TOKEN == '' }}
        uses: actions/configure-pages@v5

      - name: Pages bootstrap note
        if: ${{ secrets.PAGES_ADMIN_TOKEN == '' }}
        run: |
          echo "::notice::If this repository has never enabled GitHub Pages before, set Settings > Pages > Source to GitHub Actions once or add a PAGES_ADMIN_TOKEN secret so the workflow can auto-enable Pages."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

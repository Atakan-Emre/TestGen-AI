name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start backend test stack
        run: docker compose up -d --build db backend

      - name: Run backend test suite
        run: docker compose exec -T backend python -m pytest -q

      - name: Print backend logs on failure
        if: failure()
        run: docker compose logs --no-color backend db

      - name: Tear down backend test stack
        if: always()
        run: docker compose down -v

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --include=optional

      - name: Run frontend tests
        run: npm run test:run

      - name: Run frontend production build
        run: npm run build

      - name: Run frontend GitHub Pages build
        run: VITE_BASE_PATH=/${{ github.event.repository.name }}/ VITE_API_URL=https://example.com/api npm run build:pages

  docker-smoke:
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build development images
        run: docker compose build backend frontend

      - name: Build production frontend image
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build frontend

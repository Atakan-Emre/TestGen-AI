[pytest]
# Pytest configuration

# Python path - backend klasörünü ekle
pythonpath = backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test output
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers
markers =
    integration: Integration tests (deselect with '-m "not integration"')
    slow: Slow tests
    unit: Unit tests

# Coverage options (optional)
# addopts = --cov=app --cov-report=html --cov-report=term

# Ignore paths
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    node_modules
    frontend
    backend/tests
    backend/src

# Ignore specific test files
testpaths = tests

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
